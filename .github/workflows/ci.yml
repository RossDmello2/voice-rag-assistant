name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt', 'voice_agent_backend/requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          python -m playwright install --with-deps chromium

      - name: Check frontend syntax
        run: node --check voice_agent_backend/frontend/script.js

      - name: Check Python syntax
        working-directory: voice_agent_backend
        run: |
          python -m py_compile $(find . -name "*.py" \
            -not -path "*/__pycache__/*" \
            -not -path "*/.venv/*" \
            -not -path "*/venv/*")

      - name: Run backend and frontend tests
        working-directory: voice_agent_backend
        run: python -m pytest tests/backend tests/frontend -q

      - name: Collect pytest suite
        working-directory: voice_agent_backend
        run: python -m pytest --collect-only -q

      - name: Import smoke
        working-directory: voice_agent_backend
        run: python scripts/checks/import_smoke.py

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
      - name: Lint package imports and syntax
        run: flake8 voice_agent_backend/app --select=E9,F63,F7 --show-source --statistics
