name: Bug report
description: Report a reproducible problem in VoiceRAG Agent.
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please remove private data, API keys, tokens, document contents, and local `.env` values before submitting.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: The app fails when...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest repeatable sequence.
      placeholder: |
        1. Start the app with ...
        2. Open ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Paste sanitized logs only.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend UI
        - Auth
        - Chat/RAG
        - Document ingestion
        - Collections
        - Speech-to-text
        - Text-to-speech
        - Deployment/Docker
        - Documentation
        - Other
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Commit or version
      placeholder: e.g. 5c6125f or main
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. Windows 11, Ubuntu 24.04, macOS 15
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: e.g. Python 3.11.9
    validations:
      required: true
  - type: textarea
    id: checks
    attributes:
      label: Checks run
      description: List the commands you ran and whether they passed.
      placeholder: |
        node --check voice_agent_backend/frontend/script.js
        cd voice_agent_backend
        python -m pytest tests/backend tests/frontend -q
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: I removed API keys, tokens, `.env` values, private document text, and local database contents from this report.
          required: true
